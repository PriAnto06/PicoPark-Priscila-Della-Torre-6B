<!doctype html>
<html>
  <head>
    <title>Pico Park Clone</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #87ceeb;
        font-family: Arial;
      }

      canvas {
        display: block;
      }

      #ui {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        font-size: 24px;
      }

      #controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 40px;
      }

      .btn {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 20px;
        border-radius: 10px;
        font-size: 20px;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>

    <div id="ui">COOPEREN PARA GANAR</div>

    <div id="controls">
      <div>
        <div class="btn" id="left">⬅️</div>
        <div class="btn" id="right">➡️</div>
      </div>
      <div class="btn" id="jump">SALTO</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const socket = io();

      let players = {};
      let key = {};
      let door = {};
      let platforms = [];
      let level = 1;

      let inputs = {
        left: false,
        right: false,
        jump: false,
      };

      // 📡 recibir estado
      socket.on("update", (data) => {
        players = data.players;
        key = data.key;
        door = data.door;
        platforms = data.platforms;
        level = data.level;
      });

      // 🎮 enviar inputs continuamente (CLAVE)
      setInterval(() => {
        socket.emit("input", inputs);
      }, 1000 / 30);

      // ⌨️ TECLADO
      document.addEventListener("keydown", (e) => {
        if (e.key === "a") inputs.left = true;
        if (e.key === "d") inputs.right = true;
        if (e.key === " ") inputs.jump = true;
      });

      document.addEventListener("keyup", (e) => {
        if (e.key === "a") inputs.left = false;
        if (e.key === "d") inputs.right = false;
        if (e.key === " ") inputs.jump = false;
      });

      // 📱 BOTONES
      function bindBtn(id, key) {
        const btn = document.getElementById(id);

        btn.onmousedown = () => (inputs[key] = true);
        btn.onmouseup = () => (inputs[key] = false);

        btn.ontouchstart = () => (inputs[key] = true);
        btn.ontouchend = () => (inputs[key] = false);
      }

      bindBtn("left", "left");
      bindBtn("right", "right");
      bindBtn("jump", "jump");

      // 👤 PERSONITA
      function drawPlayer(p) {
        let x = p.x;
        let y = p.y;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.roundRect(x, y, 40, 40, 15);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x + 12, y + 15, 5, 0, Math.PI * 2);
        ctx.arc(x + 28, y + 15, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      // 🎨 RENDER
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // fondo
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // plataformas
        ctx.fillStyle = "green";
        for (let p of platforms) {
          ctx.fillRect(p.x, p.y, p.w, p.h);
        }

        // puerta
        ctx.fillStyle = "brown";
        ctx.fillRect(door.x, door.y, 50, 70);

        // llave
        ctx.fillStyle = "gold";
        ctx.fillRect(key.x, key.y, 20, 20);

        // jugadores
        for (let id in players) {
          drawPlayer(players[id]);
        }

        // UI
        ctx.fillStyle = "black";
        ctx.fillText("Nivel: " + level, 20, 30);

        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </body>
</html>
