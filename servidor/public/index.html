<!doctype html>
<html>
  <head>
    <title>Pico Park Fix</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #87ceeb;
      }
      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const socket = io();

      let player = {};
      let key = {};
      let door = {};
      let platforms = [];
      let level = 1;

      let inputs = { left: false, right: false, jump: false };

      // 📡 datos del server
      socket.on("update", (data) => {
        const ids = Object.keys(data.players);

        if (ids.length > 0) {
          player = data.players[ids[0]];
        }

        key = data.key;
        door = data.door;
        platforms = data.platforms;
        level = data.level;
      });

      // 🎮 controles
      document.addEventListener("keydown", (e) => {
        if (e.key === "a") inputs.left = true;
        if (e.key === "d") inputs.right = true;
        if (e.key === " ") inputs.jump = true;

        socket.emit("input", inputs);
      });

      document.addEventListener("keyup", (e) => {
        if (e.key === "a") inputs.left = false;
        if (e.key === "d") inputs.right = false;
        if (e.key === " ") inputs.jump = false;

        socket.emit("input", inputs);
      });

      // 👤 player
      function drawPlayer(p) {
        if (!p) return;

        ctx.fillStyle = p.color || "red";
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, 40, 40, 15);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x + 12, p.y + 15, 5, 0, Math.PI * 2);
        ctx.arc(p.x + 28, p.y + 15, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      // 🎮 LOOP
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // fondo
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // plataformas
        ctx.fillStyle = "green";
        for (let p of platforms) {
          ctx.fillRect(p.x, p.y, p.w, p.h);
        }

        // 🚪 PUERTA (AQUÍ VA LO QUE PEDISTE)
        ctx.fillStyle = door.unlocked ? "orange" : "brown";
        ctx.fillRect(door.x, door.y, 50, 70);

        // 🔑 llave
        if (key && !player.hasKey) {
          ctx.fillStyle = "gold";
          ctx.fillRect(key.x, key.y, 20, 20);
        }

        // 👤 jugador
        drawPlayer(player);

        // UI
        ctx.fillStyle = "black";
        ctx.font = "20px Arial";
        ctx.fillText("Nivel: " + level, 20, 30);

        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </body>
</html>
